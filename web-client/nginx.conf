server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single Page Application (SPA) yönlendirmeleri için gerekli:
    # Kullanıcı alt sayfalara doğrudan girdiğinde (örn: /dashboard),
    # 404 hatası almaması için Nginx'i index.html'e yönlendiriyoruz.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik dosyaları (resimler, css, js) tarayıcı önbelleğine alma (Performans Optimizasyonu)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|otf|ttf|svg|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}